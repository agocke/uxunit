name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for NuGet trusted publishing (OIDC)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read version
        id: version
        run: |
          VERSION=$(sed -n 's:.*<Version>\([^<]*\)</Version>.*:\1:p' Directory.Build.props | head -n1 | tr -d '[:space:]')
          if [ -z "$VERSION" ]; then
            echo "Could not read <Version> from Directory.Build.props." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Build
        run: >-
          dotnet build NXTest.sln
          -c Release -p:ContinuousIntegrationBuild=true

      - name: Run tests
        run: dotnet test NXTest.sln -c Release --no-build

      - name: Pack
        run: |
          for proj in Core Runtime Generators; do
            dotnet pack "src/NXTest.$proj/NXTest.$proj.csproj" \
              -c Release --no-build
          done

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: >-
          dotnet nuget push "artifacts/package/release/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/package/release/*.nupkg
